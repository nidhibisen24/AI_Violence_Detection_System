<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sentinel AI | Violence Detection System</title>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;700;900&family=JetBrains+Mono&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary-gold: #FFD700; 
            --deep-black: #0d0d0d;
            --danger: #d90429;
            --success: #2b9348;
            --border-color: #333;
        }

        body {
            margin: 0;
            background-color: var(--deep-black);
            color: #e0e0e0;
            font-family: 'Roboto', sans-serif;
        }

        .container {
            max-width: 1100px;
            margin: 0 auto;
            padding: 40px 20px;
        }

        /* NEW TOP HEADING SECTION */
        .system-header {
            margin-bottom: 30px;
            border-left: 5px solid var(--primary-gold);
            padding-left: 20px;
        }

        .system-header h1 {
            font-size: 2.2rem;
            font-weight: 700;
            margin: 0;
            text-transform: uppercase;
            letter-spacing: 2px;
            color: #fff;
        }

        .system-header p {
            margin: 5px 0 0 0;
            color: #666;
            font-size: 0.9rem;
            font-family: 'JetBrains Mono', monospace;
        }

        /* COMPACT UPLOAD SECTION */
        .upload-section {
            background: #1a1a1a;
            border: 1px solid var(--border-color);
            padding: 20px;
            margin-bottom: 25px;
        }

        .input-group {
            display: flex;
            gap: 15px;
            max-width: 500px;
        }

        input[type="file"] {
            background: #000;
            padding: 8px;
            width: 250px; 
            border: 1px solid #333;
            color: #ccc;
            font-size: 0.85rem;
        }

        .btn-analyze {
            background: #fdfdfd;
            color: #000;
            border: none;
            padding: 10px 25px;
            font-weight: 700;
            cursor: pointer;
            text-transform: uppercase;
            font-size: 0.85rem;
        }

        .btn-analyze:hover {
            background: var(--primary-gold);
        }

        /* SEAMLESS ANALYSIS BLOCK */
        .analysis-block {
            display: grid;
            grid-template-columns: 1.5fr 1fr;
            gap: 0; 
            border: 1px solid var(--border-color);
        }

        .video-container {
            background: #000;
            line-height: 0;
            border-right: 1px solid var(--border-color);
        }

        video {
            width: 100%;
            display: block;
        }

        .info-panel {
            background: #141414;
            padding: 40px;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        .label {
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.8rem;
            color: #666;
            margin-bottom: 10px;
        }

        /* BOLD PREDICTION PORTION */
        .prediction-text {
            font-size: 4rem; 
            font-weight: 900; 
            margin: 0 0 20px 0;
            line-height: 1;
            text-transform: uppercase;
        }

        .Violence .prediction-text { color: var(--danger); }
        .NonViolence .prediction-text { color: var(--success); }

        .stat-group {
            border-top: 1px solid #333;
            padding-top: 20px;
        }

        .conf-label {
            font-size: 1rem;
            margin-bottom: 10px;
            color: #aaa;
        }

        .progress-bg {
            height: 8px;
            background: #222;
            overflow: hidden;
        }

        .progress-fill {
            height: 100%;
            background: var(--primary-gold);
        }

        @media (max-width: 850px) {
            .analysis-block { grid-template-columns: 1fr; }
            .video-container { border-right: none; border-bottom: 1px solid var(--border-color); }
        }
    </style>
</head>
<body>

<div class="container">
    <div class="system-header">
        <h1>Violence Detection System</h1>
        <p>Neural Network Video Analysis Interface</p>
    </div>

    <div class="upload-section">
        <form method="post" enctype="multipart/form-data" class="input-group">
            <input type="file" name="file" accept="video/*">
            <button type="submit" class="btn-analyze">Analyze</button>
        </form>
    </div>

    {% if video_url %}
    <div class="analysis-block {{ prediction }}">
        <div class="video-container">
            <video autoplay muted loop controls>
                <source src="{{ url_for('uploaded_file', filename=video_url) }}" type="video/mp4">
            </video>
        </div>

        <div class="info-panel">
            <div class="label">STATUS: ANALYSIS_COMPLETE</div>
            <div class="prediction-text">{{ prediction }}</div>

            <div class="stat-group">
                <div class="conf-label">Confidence Score: {{ confidence }}</div>
                <div class="progress-bg">
                    <div class="progress-fill" style="width: {{ confidence }}"></div>
                </div>
            </div>
        </div>
    </div>
    {% endif %}

    {% if error %}
        <div style="background: rgba(217, 4, 41, 0.1); color: var(--danger); padding: 15px; border: 1px solid var(--danger); margin-top: 20px;">
            <strong>System Error:</strong> {{ error }}
        </div>
    {% endif %}
</div>

</body>
</html>
